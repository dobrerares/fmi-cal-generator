name: Generate Calendars

on:
  schedule:
    # Every Sunday at 18:00 UTC
    - cron: "0 18 * * 0"
  workflow_dispatch:
    inputs:
      semester:
        description: "Semester override (e.g. 2025-2). Leave empty for auto-detect."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Generate all calendars
        run: python scripts/generate_all.py ${{ inputs.semester }}

      - name: Generate index page
        run: python scripts/generate_index.py

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=fmi-cal-generator
